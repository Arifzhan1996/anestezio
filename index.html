<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>АнестезиоЛог</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f4;color:#1c1c1b;min-height:100vh}
.screen{display:none}.screen.active{display:block}
.center-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:1rem;padding:2rem}
.card{background:#fff;border:1px solid #e5e5e3;border-radius:12px;padding:2rem;width:100%;max-width:360px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card h2{font-size:20px;font-weight:700;margin-bottom:1.5rem}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:.9rem}
.field label{font-size:13px;color:#666;font-weight:500}
.field input,.field select{width:100%;padding:9px 12px;font-size:14px;border:1px solid #d6d5d1;border-radius:8px;background:#fff;color:#1c1c1b}
.field input:focus{outline:none;border-color:#555}
.btn{width:100%;padding:11px;background:#1c1c1b;border:none;border-radius:8px;font-size:15px;font-weight:600;color:#fff;cursor:pointer}
.btn:hover{background:#333}
.err{font-size:12px;color:#c0392b;min-height:16px;margin-top:.25rem}
.hint{font-size:12px;color:#bbb;text-align:center}
.topbar{background:#fff;border-bottom:1px solid #e5e5e3;padding:12px 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar h1{font-size:16px;font-weight:700}
.badge{font-size:11px;padding:3px 10px;border-radius:6px;font-weight:600;margin-left:8px}
.badge-doc{background:#e8f4fd;color:#1a6fa0}
.badge-adm{background:#fff3cd;color:#856404}
.sync-ind{font-size:12px;padding:3px 10px;border-radius:6px;display:inline-flex;align-items:center;gap:4px}
.sync-ok{background:#d1fae5;color:#065f46}
.sync-err{background:#fee2e2;color:#991b1b}
.sync-spin{background:#f1f0ee;color:#666}
.btn-sm{padding:7px 14px;font-size:13px;border:1px solid #d6d5d1;border-radius:8px;background:#fff;color:#555;cursor:pointer}
.btn-sm:hover{background:#f5f5f4}
.tabs{display:flex;border-bottom:1px solid #e5e5e3;padding:0 1.25rem;background:#fff;overflow-x:auto}
.tab{padding:11px 16px;font-size:14px;cursor:pointer;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;font-weight:500}
.tab.active{color:#1c1c1b;border-bottom-color:#1c1c1b;font-weight:700}
.tab:hover:not(.active){color:#333}
.content{padding:1.25rem;max-width:940px;margin:0 auto}
.app-card{background:#fff;border:1px solid #e5e5e3;border-radius:12px;padding:1.1rem 1.25rem;margin-bottom:1rem}
.card-title{font-size:15px;font-weight:700;margin-bottom:1rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:.75rem}
.form-row.three{grid-template-columns:1fr 1fr 1fr}
@media(max-width:560px){.form-row,.form-row.three{grid-template-columns:1fr}}
.btn-save{padding:10px 22px;background:#1c1c1b;border:none;border-radius:8px;font-size:14px;font-weight:600;color:#fff;cursor:pointer}
.btn-save:hover{background:#333}
.ok-msg{font-size:13px;color:#198754;display:none}
table{width:100%;font-size:13px;border-collapse:collapse}
th{text-align:left;font-size:12px;font-weight:600;color:#888;padding:8px 12px;border-bottom:1px solid #eee;background:#fafaf9}
td{padding:9px 12px;border-bottom:1px solid #f0f0ee;color:#1c1c1b;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf9}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:5px;font-weight:600}
.tag-etn{background:#e8f4fd;color:#1a6fa0}
.tag-mask{background:#ede9fe;color:#5b21b6}
.tag-spin{background:#d1fae5;color:#065f46}
.tag-epi{background:#fff3cd;color:#856404}
.tag-reg{background:#fff0e6;color:#9a3412}
.tag-tvva{background:#fee2e2;color:#991b1b}
.tag-mon{background:#f1f0ee;color:#6b6b69}
.del-btn{background:none;border:1px solid #fca5a5;color:#dc2626;cursor:pointer;font-size:13px;padding:4px 10px;border-radius:6px;font-weight:600}
.del-btn:hover{background:#fee2e2}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.25rem}
@media(max-width:400px){.grid-3{grid-template-columns:1fr 1fr}}
.metric{background:#fafaf9;border:1px solid #e5e5e3;border-radius:10px;padding:.9rem 1rem}
.metric-label{font-size:12px;color:#888;margin-bottom:4px;font-weight:500}
.metric-val{font-size:22px;font-weight:700}
.filter-row{display:flex;gap:10px;margin-bottom:1rem;flex-wrap:wrap}
.filter-row select{padding:7px 10px;font-size:13px;border:1px solid #d6d5d1;border-radius:8px;background:#fff;color:#1c1c1b}
.empty{text-align:center;padding:2.5rem;color:#bbb;font-size:14px}
.anest-block{background:#fafaf9;border:1px solid #e5e5e3;border-radius:10px;padding:1rem;margin-bottom:1rem}
.anest-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.75rem}
.anest-name{font-size:15px;font-weight:700}
.anest-meta{font-size:12px;color:#888;margin-top:2px}
.anest-total{font-size:18px;font-weight:700}
.user-row{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:#fafaf9;border:1px solid #e5e5e3;border-radius:8px;margin-bottom:8px}
.disc-badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;background:#fee2e2;color:#991b1b;font-weight:700;margin-left:4px;vertical-align:middle}
.orig-price{font-size:11px;color:#bbb;text-decoration:line-through;margin-right:3px}
.price-preview{font-size:14px;font-weight:700;margin-left:10px;min-width:130px;display:inline-block}
.disc-label{display:flex;align-items:center;gap:7px;font-size:14px;cursor:pointer;font-weight:500}
.disc-label input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#dc2626}
.overlay{position:fixed;inset:0;background:rgba(255,255,255,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:100;font-size:15px;color:#555}
.spinner{width:36px;height:36px;border:3px solid #e5e5e3;border-top-color:#1c1c1b;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="overlay" class="overlay" style="display:none">
  <div class="spinner"></div>
  <span id="overlayMsg">Загрузка...</span>
</div>

<div id="loginScreen" class="screen">
  <div class="center-wrap">
    <div class="card">
      <h2>🩺 АнестезиоЛог</h2>
      <div class="field"><label>Логин</label><input type="text" id="loginInput" placeholder="Введите логин" /></div>
      <div class="field"><label>Пароль</label><input type="password" id="passInput" placeholder="Введите пароль" /></div>
      <div class="err" id="loginErr"></div>
      <button class="btn" onclick="doLogin()">Войти</button>
    </div>
    <p class="hint">Первый вход: admin / admin123</p>
  </div>
</div>

<div id="mainScreen" class="screen">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:6px">
      <h1>АнестезиоЛог</h1>
      <span class="badge" id="roleLabel"></span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <span class="sync-ind sync-ok" id="syncStatus">● онлайн</span>
      <span style="font-size:13px;color:#888" id="userLabel"></span>
      <button class="btn-sm" onclick="doLogout()">Выйти</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" data-tab="add" onclick="switchTab('add')">➕ Добавить</div>
    <div class="tab" data-tab="my" onclick="switchTab('my')">📋 Мои наркозы</div>
    <div class="tab admin-tab" data-tab="report" onclick="switchTab('report')">📊 Отчёт</div>
    <div class="tab admin-tab" data-tab="users" onclick="switchTab('users')">👥 Сотрудники</div>
  </div>
  <div class="content">

    <div id="tabAdd">
      <div class="app-card">
        <div class="card-title">Новый наркоз</div>
        <div class="form-row three">
          <div class="field" style="margin:0"><label>Дата</label><input type="date" id="fDate" /></div>
          <div class="field" style="margin:0"><label>Пациент (инициалы)</label><input type="text" id="fPatient" placeholder="Иванов И.И." /></div>
          <div class="field" style="margin:0"><label>Клиника / отделение</label><input type="text" id="fClinic" placeholder="ННМЦ, частная..." /></div>
        </div>
        <div class="form-row">
          <div class="field" style="margin:0">
            <label>Вид анестезии</label>
            <select id="fType" onchange="updateDurOptions()">
              <option value="ЭТН">Общий наркоз (ЭТН)</option>
              <option value="Масочный">Масочный наркоз</option>
              <option value="Спинальная">Спинальная</option>
              <option value="Эпидуральная">Эпидуральная</option>
              <option value="Регионарная">Регионарная (блокады)</option>
              <option value="ТВВА">Внутривенная (ТВВА)</option>
              <option value="Мониторинг">Мониторинговая седация</option>
            </select>
          </div>
          <div class="field" style="margin:0">
            <label>Длительность</label>
            <select id="fDuration" onchange="updatePreview()"></select>
          </div>
        </div>
        <div class="field">
          <label>Скидка</label>
          <div style="display:flex;align-items:center;flex-wrap:wrap;gap:8px">
            <label class="disc-label"><input type="checkbox" id="fDisc" onchange="updatePreview()"> −15% скидка</label>
            <span class="price-preview" id="pricePreview"></span>
          </div>
        </div>
        <div class="field"><label>Примечание</label><input type="text" id="fNote" placeholder="Диагноз, особенности..." /></div>
        <div style="display:flex;align-items:center;gap:12px;margin-top:.5rem;flex-wrap:wrap">
          <button class="btn-save" onclick="addRecord()">✓ Сохранить</button>
          <span class="err" id="addErr" style="margin:0"></span>
          <span class="ok-msg" id="addOk">✓ Сохранено!</span>
        </div>
      </div>
    </div>

    <div id="tabMy" style="display:none">
      <div class="filter-row">
        <select id="filterMonth" onchange="renderMyTable()"><option value="">Все периоды</option></select>
        <select id="filterType" onchange="renderMyTable()">
          <option value="">Все виды</option>
          <option>ЭТН</option><option>Масочный</option><option>Спинальная</option>
          <option>Эпидуральная</option><option>Регионарная</option><option>ТВВА</option><option>Мониторинг</option>
        </select>
        <button class="btn-sm" onclick="syncAndRefresh()">🔄 Обновить</button>
      </div>
      <div class="grid-3" id="myMetrics"></div>
      <div class="app-card" style="padding:0;overflow:auto"><div id="myTableWrap"></div></div>
      <div id="myTotal" style="text-align:right;padding:.75rem 0;font-size:15px;font-weight:700"></div>
    </div>

    <div id="tabReport" style="display:none">
      <div class="filter-row">
        <select id="repMonth" onchange="renderReport()"><option value="">Все периоды</option></select>
        <button class="btn-sm" onclick="syncAndRefresh()">🔄 Обновить</button>
      </div>
      <div id="reportWrap"></div>
    </div>

    <div id="tabUsers" style="display:none">
      <div style="background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:12px 16px;font-size:13px;color:#0369a1;margin-bottom:1rem;line-height:1.6">
        ℹ️ Врачам отправляйте ссылку: <b>arifzhan1996.github.io/anestezio</b>
      </div>
      <div class="app-card">
        <div class="card-title">Добавить сотрудника</div>
        <div class="form-row three">
          <div class="field" style="margin:0"><label>ФИО</label><input type="text" id="nName" placeholder="Иванов Иван Иванович" /></div>
          <div class="field" style="margin:0"><label>Логин</label><input type="text" id="nLogin" placeholder="ivanov" /></div>
          <div class="field" style="margin:0"><label>Пароль</label><input type="text" id="nPass" placeholder="пароль" /></div>
        </div>
        <div style="display:flex;align-items:center;gap:12px;margin-top:.5rem">
          <button class="btn-save" onclick="addUser()">✓ Добавить</button>
          <span class="err" id="userErr" style="margin:0"></span>
          <span class="ok-msg" id="userOk" style="margin:0">✓ Добавлен!</span>
        </div>
      </div>
      <div class="app-card">
        <div class="card-title">Список сотрудников</div>
        <div id="userListWrap"></div>
      </div>
    </div>
  </div>
</div>

<script>
const TARIFF=[[60,15000],[90,20000],[120,35000],[150,40000],[180,45000],[210,50000],[240,55000],[270,60000],[300,65000],[330,70000],[360,75000],[390,80000],[420,85000],[450,90000],[480,95000],[510,100000],[540,105000],[570,110000],[600,115000]];
const MASK_PRICE=10000;
const TC={ЭТН:'tag-etn',Масочный:'tag-mask',Спинальная:'tag-spin',Эпидуральная:'tag-epi',Регионарная:'tag-reg',ТВВА:'tag-tvva',Мониторинг:'tag-mon'};
const API_KEY='$2a$10$mP055mMj42jdQE7qavMVCuG86alDPeXij12AoC8iMDUzp7wZnN5W2';
const BIN_ID_KEY='anlog_bin_v2';
let S={users:{},records:[]};
let me=null;
let BIN_ID=localStorage.getItem(BIN_ID_KEY)||'';

function showOvr(msg){document.getElementById('overlayMsg').textContent=msg;document.getElementById('overlay').style.display='flex';}
function hideOvr(){document.getElementById('overlay').style.display='none';}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function setSS(s){
  const el=document.getElementById('syncStatus');if(!el)return;
  if(s==='ok'){el.className='sync-ind sync-ok';el.textContent='● онлайн';}
  else if(s==='err'){el.className='sync-ind sync-err';el.textContent='● нет связи';}
  else{el.className='sync-ind sync-spin';el.textContent='● сохранение...';}
}

async function binCreate(){
  const r=await fetch('https://api.jsonbin.io/v3/b',{
    method:'POST',
    headers:{'Content-Type':'application/json','X-Master-Key':API_KEY,'X-Bin-Name':'AnestezioLog'},
    body:JSON.stringify({users:{admin:{name:'Администратор',password:'admin123',role:'admin'}},records:[]})
  });
  if(!r.ok)throw new Error('Ошибка создания '+r.status);
  const d=await r.json();return d.metadata.id;
}
async function binRead(){
  const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{headers:{'X-Master-Key':API_KEY}});
  if(!r.ok)throw new Error('Ошибка чтения '+r.status);
  const d=await r.json();return d.record;
}
async function binWrite(){
  const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
    method:'PUT',
    headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},
    body:JSON.stringify(S)
  });
  if(!r.ok)throw new Error('Ошибка записи '+r.status);
}

async function syncDown(){
  try{S=await binRead();if(!S.users)S.users={};if(!S.records)S.records=[];setSS('ok');return true;}
  catch(e){setSS('err');return false;}
}
async function syncUp(){
  setSS('spin');
  try{await binWrite();setSS('ok');}
  catch(e){setSS('err');alert('Ошибка сохранения: '+e.message);}
}
async function syncAndRefresh(){
  showOvr('Обновление...');await syncDown();hideOvr();
  fillMonthFilters();
  const t=document.querySelector('.tab.active');
  if(t){const n=t.dataset.tab;if(n==='my')renderMyTable();if(n==='report')renderReport();if(n==='users')renderUserList();}
}

async function init(){
  showOvr('Загрузка...');
  try{
    if(!BIN_ID){
      showOvr('Первый запуск...');
      BIN_ID=await binCreate();
      localStorage.setItem(BIN_ID_KEY,BIN_ID);
    }
    await syncDown();
  }catch(e){
    // Попробуем создать новый bin
    try{BIN_ID=await binCreate();localStorage.setItem(BIN_ID_KEY,BIN_ID);await syncDown();}
    catch(e2){hideOvr();alert('Нет интернета или ошибка подключения');return;}
  }
  hideOvr();show('loginScreen');
}

function getPrice(type,min){if(type==='Масочный')return MASK_PRICE;const r=TARIFF.find(t=>t[0]===min);return r?r[1]:TARIFF[0][1];}
function fmtDur(m){const h=Math.floor(m/60),mn=m%60;if(!mn)return h===1?'1 час':h+' ч';return h+' ч '+mn+' мин';}

function updateDurOptions(){
  const type=document.getElementById('fType').value;
  const sel=document.getElementById('fDuration');
  if(type==='Масочный'){sel.innerHTML='<option value="0">— фиксированно (10 000 ₸)</option>';sel.disabled=true;}
  else{sel.disabled=false;sel.innerHTML=TARIFF.map(([m,p])=>`<option value="${m}">${fmtDur(m)} — ${p.toLocaleString('ru')} ₸</option>`).join('');}
  updatePreview();
}
function updatePreview(){
  const type=document.getElementById('fType').value;
  const min=parseInt(document.getElementById('fDuration').value)||60;
  const disc=document.getElementById('fDisc').checked;
  const p=getPrice(type,min);
  const el=document.getElementById('pricePreview');
  if(disc){const d=Math.round(p*0.85);el.innerHTML=`<span style="text-decoration:line-through;color:#bbb;font-size:13px;font-weight:400">${p.toLocaleString('ru')} ₸</span> → <span style="color:#dc2626">${d.toLocaleString('ru')} ₸</span>`;}
  else{el.textContent=p.toLocaleString('ru')+' ₸';}
}

async function doLogin(){
  const login=document.getElementById('loginInput').value.trim();
  const pass=document.getElementById('passInput').value;
  showOvr('Проверка...');
  await syncDown();
  hideOvr();
  const u=S.users[login];
  if(!u||u.password!==pass){document.getElementById('loginErr').textContent='Неверный логин или пароль';return;}
  document.getElementById('loginErr').textContent='';
  me={login,...u};
  show('mainScreen');
  document.getElementById('userLabel').textContent=u.name;
  const isAdm=u.role==='admin';
  document.getElementById('roleLabel').textContent=isAdm?'Администратор':'Врач';
  document.getElementById('roleLabel').className='badge '+(isAdm?'badge-adm':'badge-doc');
  document.querySelectorAll('.admin-tab').forEach(t=>t.style.display=isAdm?'':'none');
  document.getElementById('fDate').value=new Date().toISOString().split('T')[0];
  updateDurOptions();fillMonthFilters();switchTab('add');
}
function doLogout(){me=null;show('loginScreen');document.getElementById('loginInput').value='';document.getElementById('passInput').value='';}

function switchTab(t){
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.dataset.tab===t));
  ['tabAdd','tabMy','tabReport','tabUsers'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById({add:'tabAdd',my:'tabMy',report:'tabReport',users:'tabUsers'}[t]).style.display='block';
  if(t==='my')renderMyTable();if(t==='report')renderReport();if(t==='users')renderUserList();
}

async function addRecord(){
  const date=document.getElementById('fDate').value;
  const patient=document.getElementById('fPatient').value.trim();
  const type=document.getElementById('fType').value;
  const minutes=parseInt(document.getElementById('fDuration').value)||0;
  const clinic=document.getElementById('fClinic').value.trim();
  const note=document.getElementById('fNote').value.trim();
  const disc=document.getElementById('fDisc').checked;
  if(!date||!patient){document.getElementById('addErr').textContent='Укажите дату и пациента';return;}
  document.getElementById('addErr').textContent='';
  const base=getPrice(type,minutes);
  const final=disc?Math.round(base*0.85):base;
  S.records.push({id:Date.now(),date,patient,type,minutes,clinic,note,disc,base,final,login:me.login});
  await syncUp();
  document.getElementById('fPatient').value='';document.getElementById('fNote').value='';
  document.getElementById('fClinic').value='';document.getElementById('fDisc').checked=false;
  updateDurOptions();fillMonthFilters();
  const ok=document.getElementById('addOk');ok.style.display='inline';setTimeout(()=>ok.style.display='none',3000);
}

function getMonths(){const s=new Set();S.records.forEach(r=>s.add(r.date.slice(0,7)));return[...s].sort().reverse();}
function fillMonthFilters(){
  const months=getMonths();
  ['filterMonth','repMonth'].forEach(id=>{
    const el=document.getElementById(id);if(!el)return;
    co
